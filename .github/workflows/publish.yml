name: Publish Lightmatter PDFs

# Manual trigger only — run from terminal with:
#   gh workflow run publish.yml
on:
  workflow_dispatch:

jobs:
  build-pdfs:
    name: Build PDFs with Oxygen Publishing Engine
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Java ─────────────────────────────────────────────────────
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ── 3. Download and unzip Oxygen Publishing Engine ───────────────────────
      - name: Download Oxygen Publishing Engine
        run: |
          curl -L \
            "https://www.oxygenxml.com/InstData/PublishingEngine/oxygen-publishing-engine.zip" \
            -o ope.zip
          unzip -q ope.zip
          echo "OPE_HOME=$(pwd)/oxygen-publishing-engine" >> $GITHUB_ENV

      # ── 4. Write license key file ─────────────────────────────────────────
      - name: License Oxygen Publishing Engine
        env:
          OXYGEN_LICENSE_KEY: ${{ secrets.OXYGEN_LICENSE_KEY }}
        run: |
          echo "$OXYGEN_LICENSE_KEY" > "$OPE_HOME/licensekey.txt"

      # ── 5. Build passage_l20.pdf ──────────────────────────────────────────────
      - name: Build passage_l20.pdf
        run: |
          "$OPE_HOME/bin/dita" \
            --input="$(pwd)/maps/passage_l20.ditamap" \
            --format=pdf-css-html5 \
            --output="$(pwd)/out/l20" \
            -Dpdf.publishing.template="$(pwd)/templates/lightmatter/lightmatter.opt"

      # ── 6. Build passage_l200.pdf ─────────────────────────────────────────────
      - name: Build passage_l200.pdf
        run: |
          "$OPE_HOME/bin/dita" \
            --input="$(pwd)/maps/passage_l200.ditamap" \
            --format=pdf-css-html5 \
            --output="$(pwd)/out/l200" \
            -Dpdf.publishing.template="$(pwd)/templates/lightmatter/lightmatter.opt"

      # ── 7. Upload passage_l20.pdf artifact ───────────────────────────────────
      - name: Upload passage_l20.pdf
        uses: actions/upload-artifact@v4
        with:
          name: passage_l20
          path: out/l20/*.pdf
          if-no-files-found: error
          retention-days: 30

      # ── 8. Upload passage_l200.pdf artifact ──────────────────────────────────
      - name: Upload passage_l200.pdf
        uses: actions/upload-artifact@v4
        with:
          name: passage_l200
          path: out/l200/*.pdf
          if-no-files-found: error
          retention-days: 30
